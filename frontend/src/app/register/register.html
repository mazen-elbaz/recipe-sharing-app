<main class="auth-page">
  <div class="auth-card card border-0 shadow">
    <div class="auth-header text-center">
      <div class="auth-icon">👨‍🍳</div>
      <h1 class="h2 mb-2">Join Recipe Share</h1>
      <p class="mb-0">Create your account and start sharing delicious ideas</p>
    </div>

    <div class="card-body p-4">
      <form #registerform="ngForm" (ngSubmit)="register(registerform)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            class="form-control"
            type="text"
            name="username"
            [(ngModel)]="user.username"
            #username="ngModel"
            required
            minlength="3"
          />
          <div class="text-danger small mt-1" *ngIf="username.touched && username.invalid">
            Username must be at least 3 characters
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input
            class="form-control"
            type="email"
            name="email"
            [(ngModel)]="user.email"
            #email="ngModel"
            required
            email
          />
          <div class="text-danger small mt-1" *ngIf="email.touched && email.invalid">
            Enter a valid email address
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <input
            class="form-control"
            type="password"
            name="password"
            [(ngModel)]="user.password"
            #password="ngModel"
            required
            minlength="6"
          />
          <div class="text-danger small mt-1" *ngIf="password.touched && password.invalid">
            Password must be at least 6 characters
          </div>
        </div>

        <button
          class="btn btn-primary w-100 py-2"
          type="submit"
          [disabled]="registerform.invalid"
        >
          Create Account
        </button>

        <div
          class="alert mt-3 mb-0"
          [class.alert-success]="message === 'Register Done'"
          [class.alert-danger]="message !== 'Register Done'"
          *ngIf="message"
        >
          {{ message }}
        </div>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        Already have an account? <a routerLink="/login">Login</a>
      </p>
    </div>
  </div>
</main>
